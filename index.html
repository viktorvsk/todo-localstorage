<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface-hover: #22222f;
      --border: #2e2e3e;
      --accent: #7c6aff;
      --accent-hover: #9580ff;
      --accent-glow: rgba(124, 106, 255, 0.25);
      --text-primary: #e8e8f0;
      --text-secondary: #8888a8;
      --text-done: #44445a;
      --danger: #ff5e6c;
      --danger-hover: #ff7480;
      --success: #4ecca3;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --transition: 0.18s ease;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px 80px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .header {
      margin-bottom: 36px;
    }

    .header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 50%, var(--success) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 6px;
    }

    .header .subtitle {
      color: var(--text-secondary);
      font-size: 0.88rem;
      letter-spacing: 0.01em;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .todo-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text-primary);
      border-radius: var(--radius);
      padding: 13px 18px;
      font-size: 0.97rem;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .todo-input::placeholder {
      color: var(--text-secondary);
    }

    .todo-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 13px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .add-btn:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .add-btn:active {
      transform: scale(0.96);
    }

    .add-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 4px;
    }

    .stats-text {
      font-size: 0.82rem;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    .clear-done-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      transition: color var(--transition), background var(--transition);
    }

    .clear-done-btn:hover {
      color: var(--danger);
      background: rgba(255, 94, 108, 0.1);
    }

    .clear-done-btn:disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color var(--transition), background var(--transition), opacity var(--transition), transform var(--transition);
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .todo-item:hover {
      border-color: #3a3a52;
      background: var(--surface-hover);
    }

    .todo-item.done {
      opacity: 0.55;
    }

    .todo-item.done:hover {
      opacity: 0.75;
    }

    /* Custom checkbox */
    .checkbox-wrap {
      position: relative;
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      cursor: pointer;
    }

    .checkbox-wrap input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .checkbox-visual {
      position: absolute;
      inset: 0;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: transparent;
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .checkbox-visual svg {
      opacity: 0;
      transform: scale(0.5);
      transition: opacity var(--transition), transform var(--transition);
      width: 12px;
      height: 12px;
      stroke: #fff;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .checkbox-wrap:hover .checkbox-visual {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .checkbox-wrap input:checked + .checkbox-visual {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox-wrap input:checked + .checkbox-visual svg {
      opacity: 1;
      transform: scale(1);
    }

    .todo-text {
      flex: 1;
      font-size: 0.97rem;
      line-height: 1.45;
      color: var(--text-primary);
      transition: color var(--transition), text-decoration-color var(--transition);
      word-break: break-word;
      text-decoration: none;
    }

    .todo-item.done .todo-text {
      color: var(--text-done);
      text-decoration: line-through;
      text-decoration-color: var(--text-done);
    }

    .delete-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 5px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--transition), color var(--transition), background var(--transition);
    }

    .todo-item:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:hover {
      color: var(--danger);
      background: rgba(255, 94, 108, 0.12);
    }

    .delete-btn svg {
      width: 16px;
      height: 16px;
    }

    .empty-state {
      text-align: center;
      padding: 52px 24px;
      color: var(--text-secondary);
    }

    .empty-state .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.5;
      display: block;
      filter: grayscale(1);
    }

    .empty-state p {
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .empty-state .hint {
      font-size: 0.8rem;
      margin-top: 8px;
      opacity: 0.65;
    }

    .progress-bar-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      border-radius: 99px;
      transition: width 0.35s ease;
    }

    @media (max-width: 480px) {
      body {
        padding: 28px 12px 60px;
      }

      .header h1 {
        font-size: 2rem;
      }

      .add-btn span {
        display: none;
      }

      .add-btn {
        padding: 13px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Todo</h1>
      <p class="subtitle">Press <kbd style="font-family:inherit;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:0.78rem;">Enter</kbd> to add &middot; stay on track</p>
    </div>

    <div class="input-row">
      <input
        type="text"
        class="todo-input"
        id="todoInput"
        placeholder="What needs to be done?"
        maxlength="280"
        autocomplete="off"
        spellcheck="true"
      />
      <button class="add-btn" id="addBtn" title="Add todo (Enter)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="2" x2="8" y2="14"/>
          <line x1="2" y1="8" x2="14" y2="8"/>
        </svg>
        <span>Add</span>
      </button>
    </div>

    <div class="progress-bar-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="stats-bar" id="statsBar" style="display:none">
      <span class="stats-text" id="statsText"></span>
      <button class="clear-done-btn" id="clearDoneBtn">Clear completed</button>
    </div>

    <div class="todo-list" id="todoList"></div>
  </div>

  <script>
    const STORAGE_KEY = 'todos';

    // --- State ---
    function loadTodos() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveTodos(todos) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    let todos = loadTodos();

    // --- DOM refs ---
    const todoInput   = document.getElementById('todoInput');
    const addBtn      = document.getElementById('addBtn');
    const todoList    = document.getElementById('todoList');
    const statsBar    = document.getElementById('statsBar');
    const statsText   = document.getElementById('statsText');
    const clearDoneBtn = document.getElementById('clearDoneBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar  = document.getElementById('progressBar');

    // --- Render ---
    function render() {
      todoList.innerHTML = '';

      if (todos.length === 0) {
        todoList.innerHTML = `
          <div class="empty-state">
            <span class="empty-icon">&#10003;</span>
            <p>All clear! Add your first task above.</p>
            <p class="hint">Type something and hit Enter or click Add.</p>
          </div>`;
        statsBar.style.display = 'none';
        progressWrap.style.display = 'none';
        return;
      }

      const doneCount = todos.filter(t => t.done).length;
      const total     = todos.length;
      const pct       = total > 0 ? Math.round((doneCount / total) * 100) : 0;

      // Progress bar
      progressWrap.style.display = 'block';
      progressBar.style.width    = pct + '%';

      // Stats bar
      statsBar.style.display = 'flex';
      if (doneCount === 0) {
        statsText.textContent = `${total} task${total !== 1 ? 's' : ''}`;
      } else if (doneCount === total) {
        statsText.textContent = `All ${total} done!`;
      } else {
        statsText.textContent = `${doneCount} of ${total} done`;
      }
      clearDoneBtn.disabled = doneCount === 0;

      // Render items: pending first, then done
      const sorted = [
        ...todos.filter(t => !t.done),
        ...todos.filter(t =>  t.done),
      ];

      sorted.forEach(todo => {
        const item = document.createElement('div');
        item.className = 'todo-item' + (todo.done ? ' done' : '');
        item.dataset.id = todo.id;

        item.innerHTML = `
          <label class="checkbox-wrap" title="${todo.done ? 'Mark undone' : 'Mark done'}">
            <input type="checkbox" ${todo.done ? 'checked' : ''} />
            <span class="checkbox-visual">
              <svg viewBox="0 0 12 12">
                <polyline points="2,6 5,9 10,3"/>
              </svg>
            </span>
          </label>
          <span class="todo-text">${escapeHtml(todo.text)}</span>
          <button class="delete-btn" title="Delete">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="3" y1="3" x2="13" y2="13"/>
              <line x1="13" y1="3" x2="3" y2="13"/>
            </svg>
          </button>`;

        // Toggle done
        item.querySelector('input[type="checkbox"]').addEventListener('change', () => {
          toggleTodo(todo.id);
        });

        // Delete
        item.querySelector('.delete-btn').addEventListener('click', () => {
          deleteTodo(todo.id);
        });

        todoList.appendChild(item);
      });
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // --- Actions ---
    function addTodo() {
      const text = todoInput.value.trim();
      if (!text) {
        todoInput.focus();
        todoInput.classList.add('shake');
        setTimeout(() => todoInput.classList.remove('shake'), 400);
        return;
      }
      todos.unshift({ id: generateId(), text, done: false });
      saveTodos(todos);
      render();
      todoInput.value = '';
      todoInput.focus();
    }

    function toggleTodo(id) {
      todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
      saveTodos(todos);
      render();
    }

    function deleteTodo(id) {
      const item = todoList.querySelector(`[data-id="${id}"]`);
      if (item) {
        item.style.transition = 'opacity 0.15s ease, transform 0.15s ease';
        item.style.opacity    = '0';
        item.style.transform  = 'translateX(12px)';
        setTimeout(() => {
          todos = todos.filter(t => t.id !== id);
          saveTodos(todos);
          render();
        }, 150);
      } else {
        todos = todos.filter(t => t.id !== id);
        saveTodos(todos);
        render();
      }
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      saveTodos(todos);
      render();
    }

    // --- Events ---
    addBtn.addEventListener('click', addTodo);

    todoInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    clearDoneBtn.addEventListener('click', clearDone);

    // Shake animation style
    const shakeStyle = document.createElement('style');
    shakeStyle.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20%       { transform: translateX(-6px); }
        40%       { transform: translateX(6px); }
        60%       { transform: translateX(-4px); }
        80%       { transform: translateX(4px); }
      }
      .shake { animation: shake 0.35s ease; }
    `;
    document.head.appendChild(shakeStyle);

    // --- Init ---
    render();
    todoInput.focus();
  </script>
</body>
</html>
